<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Local Community Event Portal</title>

    <link rel="stylesheet" href="style.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <header>
        <h1>Local Community Event Portal</h1>
        <p>Find and Register for Community Events</p>
    </header>

    <!-- Search & Filter Section -->

    <section class="controls">

        <input
            type="text"
            id="searchBox"
            placeholder="Search events by name">

        <select id="categoryFilter">

            <option value="All">
                All Categories
            </option>

            <option value="Music">
                Music
            </option>

            <option value="Workshop">
                Workshop
            </option>

            <option value="Sports">
                Sports
            </option>

        </select>

    </section>

    <!-- Loading Spinner -->

    <div id="loadingSpinner">
        Loading Events...
    </div>

    <!-- Events Container -->

    <section>

        <h2>Upcoming Events</h2>

        <div id="eventContainer">

        </div>

    </section>

    <!-- Registration Form -->

    <section>

        <h2>Event Registration</h2>

        <form id="registrationForm">

            <label>Name</label>

            <input
                type="text"
                name="name"
                placeholder="Enter your name">

            <span id="nameError" class="error"></span>

            <label>Email</label>

            <input
                type="email"
                name="email"
                placeholder="Enter your email">

            <span id="emailError" class="error"></span>

            <label>Select Event</label>

            <select name="event">

                <option value="">
                    Choose Event
                </option>

                <option value="Music Festival">
                    Music Festival
                </option>

                <option value="Sports Day">
                    Sports Day
                </option>

                <option value="Workshop on Baking">
                    Workshop on Baking
                </option>

            </select>

            <span id="eventError" class="error"></span>

            <button
                type="submit"
                id="registerBtn">

                Register

            </button>

        </form>

        <div id="messageBox"></div>

    </section>

    <!-- jQuery Demo Section -->

    <section>

        <h2>jQuery Demo</h2>

        <button id="showEvents">
            Fade In Events
        </button>

        <button id="hideEvents">
            Fade Out Events
        </button>

    </section>

    <!-- Framework Note -->

    <section>

        <h2>Framework Benefit</h2>

        <p>
            Frameworks like React and Vue help build
            reusable UI components and make large
            applications easier to manage.
        </p>

    </section>

    <footer>

        <p>
            © 2026 Community Event Portal
        </p>

    </footer>

    <!-- JavaScript File -->

    <script src="main.js"></script>

</body>

</html>
